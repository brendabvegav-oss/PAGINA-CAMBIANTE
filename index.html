<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seleccionando colores</title>
</head>
<body>

    <script>
        var color;
        color=prompt('escoje color, color 1, color 2, color 3: ', '1, 2 ó 3');

        if (color == "1")
        {
            document.bgColor='#000022';
        }
        else if(color == "2")
        {
            document.bgColor='#0005ff';
        }
        else if(color == "3")
        {
            document.bgColor='#0000ef';
        }
        else
        {
            document.write('no este jugando');
        }

    </script>

</body>
</html>
